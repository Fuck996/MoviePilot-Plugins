name: Build MediaLibraryKeeper

on:
  push:
    branches:
      - main
    paths:
      - 'package.v2.json'
      - 'plugins.v2/medialibrarykeeper/index.html'
      - 'plugins.v2/medialibrarykeeper/package.json'
      - 'plugins.v2/medialibrarykeeper/src/**'
      - 'plugins.v2/medialibrarykeeper/vite.config.js'
  pull_request:
    branches:
      - main
    paths:
      - 'package.v2.json'
      - 'plugins.v2/medialibrarykeeper/index.html'
      - 'plugins.v2/medialibrarykeeper/package.json'
      - 'plugins.v2/medialibrarykeeper/src/**'
      - 'plugins.v2/medialibrarykeeper/vite.config.js'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-medialibrarykeeper-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Vue federation assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: plugins.v2/medialibrarykeeper
        run: npm install --no-package-lock --registry=https://registry.npmmirror.com

      - name: Build frontend
        working-directory: plugins.v2/medialibrarykeeper
        run: npm run build

      - name: Commit built assets
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          if git diff --quiet -- plugins.v2/medialibrarykeeper/dist; then
            echo "No built asset changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plugins.v2/medialibrarykeeper/dist
          git commit -m "Build medialibrarykeeper frontend [skip ci]"
          git push
